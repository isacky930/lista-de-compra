<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lista Compartilhada</title>
  <link rel="stylesheet" href="src/1/css/index.css">
</head>

<body>
  <div class="background"></div>

  <div class="container">
    
    <div class="header">
      <h1>🛒 Lista</h1>
      <p>Organize suas compras em tempo real</p>
    </div>

    <div class="form">

      <div class="input-group">
        <input type="email" id="email" required>
        <label>Email</label>
      </div>

      <div class="input-group">
        <input type="password" id="senha" required>
        <label>Senha</label>
      </div>

      <button onclick="login()" class="btn-primary">
        Entrar
      </button>

      <p class="link">
        Não tem conta? <span onclick="cadastro()">Criar agora</span>
      </p>

    </div>

  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
