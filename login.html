<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 2026 · Login</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/login.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <main class="login-container">
        <div class="login-card">

            <div class="logo-wrap">
                <img src="src/img/icon-72x72.png" alt="Logo" class="logo">
            </div>

            <h1>Lista 2026</h1>
            <p class="subtitle">Compartilhe sua lista de compras em tempo real</p>

            <form id="login-form" onsubmit="event.preventDefault(); login();">

                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" placeholder=" " required>
                    <label for="senha">Senha</label>
                </div>

                <button type="submit" class="btn-primary" id="btn-login">
                    Entrar
                </button>

                <button type="button" class="btn-link" onclick="cadastro()">
                    Criar conta gratuita
                </button>

            </form>

            <p class="legal">Ao continuar, você concorda com os termos.</p>

        </div>
    </main>

    <script type="module" src="auth.js"></script>

</body>
</html>
