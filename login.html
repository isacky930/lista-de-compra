<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 2026 · Login</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/login.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <main class="login-container">
        <div class="login-card">

            <div class="logo-wrap">
                <img src="src/img/icon-512x512.png" alt="Logo" class="logo">
            </div>

            <h1>Lista 2026</h1>
            <p class="subtitle">Compartilhe sua lista de compras em tempo real</p>

            <form id="login-form" onsubmit="event.preventDefault(); login();">

                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" placeholder=" " required>
                    <label for="senha">Senha</label>
                </div>

                <button type="submit" class="btn-primary" id="btn-login">
                    Entrar
                </button>

            </form>

            <div class="divider">Ou</div>

            <button type="button" class="btn-google" onclick="loginGoogle()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                </svg>
                Continuar com Google
            </button>

            <button type="button" class="btn-signup" onclick="cadastro()">
                Criar conta gratuita
            </button>

            <p class="legal">Ao continuar, você concorda com os termos.</p>

        </div>
    </main>

    <script type="module" src="auth.js"></script>

</body>
</html>
