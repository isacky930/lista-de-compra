<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listify · Login</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/login.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <main class="login-container">
        <div class="login-card">

            <div class="logo-wrap">
                <img src="src/img/icon-512x512.png" alt="Logo" class="logo">
            </div>

            <h1>Listify</h1>
            <p class="subtitle">Compartilhe sua lista de compras em tempo real</p>

            <form id="login-form" onsubmit="event.preventDefault(); login();">

                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" placeholder=" " required>
                    <label for="senha">Senha</label>
                </div>

                <button type="submit" class="btn-primary" id="btn-login">
                    Entrar
                </button>

            </form>

            <div class="divider">Ou</div>

            <button type="button" class="btn-google" onclick="loginGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar com Google
            </button>

            <button type="button" class="btn-signup" onclick="cadastro()">
                Criar conta gratuita
            </button>

            <p class="legal">Ao continuar, você concorda com os termos.</p>

        </div>
    </main>

    <script type="module">
        import { supabase } from './supabaseClient.js'

        // Verifica se já está logado
        async function checkAuth() {
            const { data } = await supabase.auth.getSession()
            if (data.session) {
                // Se já está logado, redireciona para index
                window.location.href = 'index.html'
            }
        }

        checkAuth()
    </script>

    <script type="module" src="auth.js"></script>

</body>
</html>
