<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0066FF">
    <meta name="description" content="Lista de compras compartilhada - Gerencie suas compras em família">
    <title>Lista Compartilhada 2026</title>
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="src/icons/icon-512x512.png">
    <link rel="stylesheet" href="src/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <!-- Área de marca com animação -->
            <div class="brand-area">
                <div class="logo-wrapper">
                    <img src="src/icons/icon-512x512.png" alt="Logo Lista Compartilhada" class="logo" id="logo">
                    <div class="logo-glow"></div>
                </div>
                <h1 class="app-title">
                    <span class="title-gradient">Lista</span>
                    <span>Compartilhada</span>
                </h1>
                <p class="app-tagline">Suas compras, sua família, sua organização</p>
            </div>

            <!-- Formulário de login -->
            <form id="loginForm" class="login-form" novalidate>
                <div class="form-header">
                    <h2 class="form-title">Acessar conta</h2>
                    <p class="form-subtitle">Entre para gerenciar suas listas</p>
                </div>

                <!-- Campo Email -->
                <div class="input-group floating-label-group">
                    <div class="input-icon">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 6L12 13L2 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="input-field">
                        <input type="email" id="email" name="email" required autocomplete="email" autofocus>
                        <label for="email">E-mail</label>
                        <div class="input-feedback"></div>
                    </div>
                </div>

                <!-- Campo Senha -->
                <div class="input-group floating-label-group">
                    <div class="input-icon">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 17V15M8 11V7C8 5.93913 8.42143 4.92172 9.17157 4.17157C9.92172 3.42143 10.9391 3 12 3C13.0609 3 14.0783 3.42143 14.8284 4.17157C15.5786 4.92172 16 5.93913 16 7V11M6 11H18C19.1046 11 20 11.8954 20 13V19C20 20.1046 19.1046 21 18 21H6C4.89543 21 4 20.1046 4 19V13C4 11.8954 4.89543 11 6 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="input-field">
                        <input type="password" id="senha" name="senha" required autocomplete="current-password">
                        <label for="senha">Senha</label>
                        <button type="button" class="toggle-password" aria-label="Mostrar senha">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>
                        <div class="input-feedback"></div>
                    </div>
                </div>

                <!-- Opções adicionais -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Lembrar de mim</span>
                    </label>
                    
                    <label class="checkbox-label biometric-option hidden" id="biometricOption">
                        <input type="checkbox" id="useBiometric">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 3C7.03 3 3 7.03 3 12C3 16.97 7.03 21 12 21C16.97 21 21 16.97 21 12C21 7.03 16.97 3 12 3Z" stroke="currentColor" stroke-width="2"/>
                                <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                                <path d="M12 8V12M12 16H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            Usar biometria (Face ID / Digital)
                        </span>
                    </label>
                    
                    <a href="#" id="forgotPassword" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <!-- Botão de login com estado de loading -->
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text">Entrar na lista</span>
                    <div class="spinner hidden"></div>
                </button>

                <!-- Área de cadastro -->
                <div class="signup-prompt">
                    <span class="signup-text">Não tem uma conta?</span>
                    <button type="button" id="signupBtn" class="btn-link">Criar conta gratuita</button>
                </div>

                <!-- Mensagem offline -->
                <div class="offline-message hidden" id="offlineMsg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 16H12.01M12 8V12M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>Modo offline - Conecte-se para fazer login</span>
                </div>
            </form>

            <!-- Status de rede -->
            <div class="network-status" id="networkStatus">
                <div class="status-indicator"></div>
                <span class="status-text">Online</span>
            </div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="auth.js"></script>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker falhou:', error);
                    });
            });
        }

        // Check for Biometric API support
        if (window.PublicKeyCredential && 
            PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
            PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
                .then(available => {
                    if (available) {
                        document.getElementById('biometricOption').classList.remove('hidden');
                    }
                });
        }

        // Network status detection
        function updateNetworkStatus() {
            const isOnline = navigator.onLine;
            const statusDiv = document.getElementById('networkStatus');
            const offlineMsg = document.getElementById('offlineMsg');
            
            if (isOnline) {
                statusDiv.classList.remove('offline');
                statusDiv.classList.add('online');
                statusDiv.querySelector('.status-text').textContent = 'Online';
                offlineMsg.classList.add('hidden');
            } else {
                statusDiv.classList.remove('online');
                statusDiv.classList.add('offline');
                statusDiv.querySelector('.status-text').textContent = 'Offline';
                offlineMsg.classList.remove('hidden');
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();
    </script>
</body>
</html>
